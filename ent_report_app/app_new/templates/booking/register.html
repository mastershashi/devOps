{% extends "base.html" %}

{% block title %}Patient Registration{% endblock %}

{% block content %}
<div class="container">
    <div class="registration-section">
        <div class="registration-card">
            <h1>Patient Registration</h1>
            <p class="subtitle">Register to book your appointment</p>
            
            <form method="POST" action="{{ url_for('booking.register_patient') }}" class="registration-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" name="name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" class="form-control" required pattern="[0-9]{10}">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="age">Age *</label>
                        <input type="number" id="age" name="age" class="form-control" required min="1" max="120">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="gender">Gender *</label>
                        <select id="gender" name="gender" class="form-control" required>
                            <option value="">-- Select --</option>
                            <option value="M">Male</option>
                            <option value="F">Female</option>
                            <option value="O">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <input type="text" id="address" name="address" class="form-control">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg btn-block">Register</button>
            </form>
        </div>
    </div>
</div>

<style>
    .registration-section {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 80px);
        padding: 2rem 0;
    }
    
    .registration-card {
        background: var(--surface);
        padding: 3rem;
        border-radius: var(--border-radius);
        box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        width: 100%;
        max-width: 600px;
    }
    
    .registration-card h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
    }
    
    .subtitle {
        color: var(--on-surface-variant);
        margin-bottom: 2rem;
    }
    
    .btn-block {
        width: 100%;
        margin-top: 1rem;
    }
</style>
{% endblock %}
